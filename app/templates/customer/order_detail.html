{% extends "customer/base.html" %}

{% block title %}訂單詳情 - ShopFlow{% endblock %}

{% block customer_content %}
<div class="container my-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-4">
            <li class="breadcrumb-item"><a href="/shop/{{ store.slug }}">首頁</a></li>
            <li class="breadcrumb-item"><a href="/shop/{{ store.slug }}/orders">我的訂單</a></li>
            <li class="breadcrumb-item active">訂單詳情</li>
        </ol>
    </nav>

    <div class="alert alert-success mb-4" id="success-alert" style="display: none;">
        <i class="bi bi-check-circle-fill me-2"></i> 感謝您的訂購！您的訂單已成功建立並完成付款。
    </div>

    <div id="order-detail-container">
        <!-- 訂單詳情將由 JavaScript 動態載入 -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const orderId = '{{ order_id }}';

        // 如果是剛從結帳頁跳轉過來的，顯示成功訊息
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('new') === 'true') {
            document.getElementById('success-alert').style.display = 'block';
        }

        loadOrderDetail(orderId);
    });

    async function loadOrderDetail(orderId) {
        const token = localStorage.getItem('customer_token_{{ store.slug }}');
        if (!token) {
            window.location.href = '/shop/{{ store.slug }}/login';
            return;
        }

        try {
            const response = await fetch(`/api/shop/{{ store.slug }}/orders/${orderId}`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                if (response.status === 401) {
                    localStorage.removeItem('customer_token_{{ store.slug }}');
                    localStorage.removeItem('customer_user_{{ store.slug }}');
                    window.location.href = '/shop/{{ store.slug }}/login';
                } else {
                    document.getElementById('order-detail-container').innerHTML = `
                    <div class="alert alert-danger">載入訂單失敗，請稍後再試。</div>
                `;
                }
                return;
            }

            const order = await response.json();



            const statusMap = {
                'pending': { text: '待處理', class: 'bg-warning text-dark' },
                'paid': { text: '已付款', class: 'bg-info text-white' },
                'shipped': { text: '已出貨', class: 'bg-success text-white' },
                'cancelled': { text: '已取消', class: 'bg-secondary text-white' }
            };
            const statusInfo = statusMap[order.status] || { text: order.status, class: 'bg-light text-dark' };

            // 判斷是否可取消 (已出貨、已取消後不可取消)
            const canCancel = ['pending', 'paid'].includes(order.status);

            document.getElementById('order-detail-container').innerHTML = `
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0">訂單編號：${order.order_number}</h5>
                    <span class="badge ${statusInfo.class} fs-6">${statusInfo.text}</span>
                </div>
                <div class="card-body">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h6 class="text-muted mb-2">訂購日期</h6>
                            <p class="mb-0">${new Date(order.created_at + "Z").toLocaleString('zh-TW')}</p>
                        </div>
                        <div class="col-md-6">
                            <h6 class="text-muted mb-2">付款方式</h6>
                            <p class="mb-0">${order.payment_method === 'credit_card' ? '信用卡支付' : order.payment_method || '未指定'}</p>
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="row mb-4">
                        <div class="col-md-12">
                            <h6 class="fw-bold mb-3"><i class="bi bi-geo-alt me-1"></i> 收件資訊</h6>
                            <p class="mb-1"><strong>收件人：</strong>${order.recipient_name}</p>
                            <p class="mb-1"><strong>電話：</strong>${order.recipient_phone}</p>
                            <p class="mb-1"><strong>地址：</strong>${order.recipient_address}</p>
                            ${order.note ? `<p class="mb-1"><strong>備註：</strong>${order.note}</p>` : ''}
                        </div>
                    </div>
                    
                    <h6 class="fw-bold mb-3"><i class="bi bi-cart3 me-1"></i> 訂單內容</h6>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>商品名稱</th>
                                    <th class="text-end">單價</th>
                                    <th class="text-center">數量</th>
                                    <th class="text-end">小計</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${order.items.map(item => `
                                    <tr>
                                        <td>
                                            <div class="fw-bold">${item.product_name}</div>
                                            ${item.spec_info ? `<small class="text-muted">${formatSpec(item.spec_info)}</small>` : ''}
                                        </td>
                                        <td class="text-end">NT$ ${item.product_price}</td>
                                        <td class="text-center">${item.quantity}</td>
                                        <td class="text-end">NT$ ${item.subtotal}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="row justify-content-end mt-4">
                        <div class="col-md-4">
                            <div class="d-flex justify-content-between mb-2">
                                <span>商品小計</span>
                                <span>NT$ ${order.subtotal}</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>運費</span>
                                <span>NT$ ${order.shipping_fee}</span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between">
                                <strong class="fs-5">總計金額</strong>
                                <strong class="fs-5 text-danger">NT$ ${order.total}</strong>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-white py-3 d-flex justify-content-between">
                    <a href="/shop/{{ store.slug }}/products" class="btn btn-outline-primary">繼續購物</a>
                    ${canCancel ? `<button class="btn btn-outline-danger" onclick="cancelOrder(${order.id})">取消訂單</button>` : ''}
                </div>
            </div>
        `;
        } catch (error) {
            console.error('載入訂單詳情失敗:', error);
            document.getElementById('order-detail-container').innerHTML = `
            <div class="alert alert-danger">伺服器錯誤，無法載入訂單。</div>
        `;
        }
    }

    async function cancelOrder(orderId) {
        if (!confirm('確定要取消此訂單嗎？如果已經付款，系統將自動啟動退款程序。')) {
            return;
        }

        const token = localStorage.getItem('customer_token_{{ store.slug }}');
        try {
            const response = await fetch(`/api/shop/{{ store.slug }}/orders/${orderId}/cancel`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (response.ok) {
                alert('訂單已成功取消，狀態已更新。');
                loadOrderDetail(orderId);
            } else {
                const error = await response.json();
                alert('取消失敗: ' + (error.detail || '未知錯誤'));
            }
        } catch (error) {
            console.error('取消訂單失敗:', error);
            alert('網路錯誤，請稍後再試。');
        }
    }

    function formatSpec(specInfo) {
        try {
            const specs = JSON.parse(specInfo);
            // 如果有 variant_spec 欄位可以直接用，或者解析 key-value
            if (specs.variant_spec) return specs.variant_spec;
            return Object.entries(specs)
                .filter(([key]) => key !== 'variant_id')
                .map(([key, value]) => `${key}: ${value}`)
                .join(' / ');
        } catch (e) {
            return specInfo;
        }
    }
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
{% endblock %}
