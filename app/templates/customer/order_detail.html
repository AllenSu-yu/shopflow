{% extends "customer/base.html" %}

{% block title %}訂單詳情 - ShopFlow{% endblock %}

{% block customer_content %}
<div class="container my-5">
    <h2 class="mb-4">訂單詳情</h2>
    <div id="order-detail">
        <!-- 訂單詳情將由 JavaScript 動態載入 -->
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const pathParts = window.location.pathname.split('/');
    const orderId = pathParts[pathParts.length - 1];
    loadOrderDetail(orderId);
});

async function loadOrderDetail(orderId) {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
        return;
    }
    
    try {
        const response = await fetch(`/api/orders/${orderId}`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        if (!response.ok) {
            // 處理認證錯誤（401）
            if (response.status === 401) {
                if (typeof handleAuthError === 'function') {
                    handleAuthError(response, '請先登入以查看訂單詳情');
                } else {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    if (confirm('您的登入已過期，請重新登入\n\n是否前往登入頁面？')) {
                        window.location.href = '/login';
                    }
                }
            } else {
                document.getElementById('order-detail').innerHTML = '<p class="text-center">載入訂單失敗</p>';
            }
            return;
        }
        
        const order = await response.json();
        
        document.getElementById('order-detail').innerHTML = `
            <div class="card">
                <div class="card-header">
                    <h5>訂單編號：#${order.id}</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <strong>訂購日期：</strong>${new Date(order.created_at).toLocaleString('zh-TW')}
                        </div>
                        <div class="col-md-6">
                            <strong>訂單狀態：</strong><span class="badge bg-info">${order.status}</span>
                        </div>
                    </div>
                    <hr>
                    <h6>收件資訊</h6>
                    <p><strong>收件人：</strong>${order.recipient_name}</p>
                    <p><strong>電話：</strong>${order.recipient_phone}</p>
                    <p><strong>地址：</strong>${order.recipient_address}</p>
                    ${order.note ? `<p><strong>備註：</strong>${order.note}</p>` : ''}
                    <hr>
                    <h6>訂單商品</h6>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>商品名稱</th>
                                <th>單價</th>
                                <th>數量</th>
                                <th>小計</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${order.items.map(item => `
                                <tr>
                                    <td>${item.product.name}</td>
                                    <td>NT$ ${item.product.price}</td>
                                    <td>${item.quantity}</td>
                                    <td>NT$ ${item.product.price * item.quantity}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                        <tfoot>
                            <tr>
                                <th colspan="3">總計</th>
                                <th>NT$ ${order.total_amount}</th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        `;
    } catch (error) {
        console.error('載入訂單詳情失敗:', error);
    }
}
</script>
{% endblock %}
