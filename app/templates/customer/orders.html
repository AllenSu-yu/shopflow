{% extends "customer/base.html" %}

{% block title %}我的訂單 - ShopFlow{% endblock %}

{% block customer_content %}
<div class="container my-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-4">
            <li class="breadcrumb-item"><a href="/shop/{{ store.slug }}">首頁</a></li>
            <li class="breadcrumb-item active">我的訂單</li>
        </ol>
    </nav>

    <h2 class="mb-4 d-flex align-items-center">
        <i class="bi bi-box-seam me-2"></i> 我的訂單
    </h2>

    <div id="orders-container">
        <!-- 訂單列表將由 JavaScript 動態載入 -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

<style>
    .order-card {
        transition: transform 0.2s;
        border: 1px solid #eee;
    }

    .order-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 .5rem 1rem rgba(0, 0, 0, .08) !important;
    }

    .status-badge {
        font-weight: 500;
        padding: 0.4em 0.8em;
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        loadOrders();
    });

    async function loadOrders() {
        const token = localStorage.getItem('customer_token_{{ store.slug }}');
        if (!token) {
            window.location.href = '/shop/{{ store.slug }}/login';
            return;
        }

        try {
            const response = await fetch('/api/shop/{{ store.slug }}/orders', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                if (response.status === 401) {
                    localStorage.removeItem('customer_token_{{ store.slug }}');
                    localStorage.removeItem('customer_user_{{ store.slug }}');
                    window.location.href = '/shop/{{ store.slug }}/login';
                } else {
                    document.getElementById('orders-container').innerHTML = `
                    <div class="alert alert-danger">載入訂單失敗，請稍後再試。</div>
                `;
                }
                return;
            }

            const data = await response.json();
            const orders = data.orders || [];

            if (orders.length === 0) {
                document.getElementById('orders-container').innerHTML = `
                <div class="text-center py-5">
                    <i class="bi bi-inbox text-muted display-1"></i>
                    <p class="mt-3 text-muted">您還沒有任何訂單記錄。</p>
                    <a href="/shop/{{ store.slug }}/products" class="btn btn-primary mt-2">開始購物去</a>
                </div>
            `;
                return;
            }

            const statusMap = {
                'pending': { text: '待處理', class: 'bg-warning text-dark' },
                'paid': { text: '已付款', class: 'bg-info text-white' },
                'shipped': { text: '已出貨', class: 'bg-success text-white' },
                'cancelled': { text: '已取消', class: 'bg-secondary text-white' }
            };

            const ordersHtml = orders.map(order => {
                const statusInfo = statusMap[order.status] || { text: order.status, class: 'bg-light text-dark' };
                const dateStr = new Date(order.created_at + "Z").toLocaleDateString('zh-TW');

                return `
                <div class="card order-card shadow-sm mb-3">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-3">
                                <div class="small text-muted mb-1">訂單編號</div>
                                <div class="fw-bold">${order.order_number}</div>
                            </div>
                            <div class="col-md-2">
                                <div class="small text-muted mb-1">訂購日期</div>
                                <div>${dateStr}</div>
                            </div>
                            <div class="col-md-2">
                                <div class="small text-muted mb-1">總計金額</div>
                                <div class="fw-bold text-danger">NT$ ${order.total}</div>
                            </div>
                            <div class="col-md-3 text-center">
                                <span class="badge status-badge ${statusInfo.class} mb-1 d-block d-md-inline-block">${statusInfo.text}</span>
                            </div>
                            <div class="col-md-2 text-md-end mt-3 mt-md-0">
                                <a href="/shop/{{ store.slug }}/orders/${order.id}" class="btn btn-outline-primary btn-sm w-100">查看詳情</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            }).join('');

            document.getElementById('orders-container').innerHTML = ordersHtml;
        } catch (error) {
            console.error('載入訂單詳情失敗:', error);
            document.getElementById('orders-container').innerHTML = `
            <div class="alert alert-danger">伺服器錯誤，無法載入訂單。</div>
        `;
        }
    }
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
{% endblock %}
