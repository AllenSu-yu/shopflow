{% extends "admin/base.html" %}

{% block title %}訂單詳情 - ShopFlow{% endblock %}

{% block admin_content %}
<h2 class="mb-4">訂單詳情</h2>

<div id="order-detail">
    <!-- 訂單詳情將由 JavaScript 動態載入 -->
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    checkAdminAuth();
    const pathParts = window.location.pathname.split('/');
    const orderId = pathParts[pathParts.length - 1];
    loadOrderDetail(orderId);
});

function checkAdminAuth() {
    const token = localStorage.getItem('admin_token');
    if (!token) {
        window.location.href = '/admin/login';
    }
}

async function loadOrderDetail(orderId) {
    const token = localStorage.getItem('admin_token');
    try {
        const response = await fetch(`/api/admin/orders/${orderId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
            document.getElementById('order-detail').innerHTML = '<p class="text-center">載入訂單失敗</p>';
            return;
        }
        
        const order = await response.json();
        
        document.getElementById('order-detail').innerHTML = `
            <div class="card">
                <div class="card-header">
                    <h5>訂單編號：#${order.id}</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <strong>訂購日期：</strong>${new Date(order.created_at).toLocaleString('zh-TW')}
                        </div>
                        <div class="col-md-6">
                            <strong>訂單狀態：</strong>
                            <select class="form-select d-inline-block w-auto ms-2" onchange="updateOrderStatus(${order.id}, this.value)">
                                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>待處理</option>
                                <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>處理中</option>
                                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>已出貨</option>
                                <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>已完成</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>已取消</option>
                            </select>
                        </div>
                    </div>
                    <hr>
                    <h6>客戶資訊</h6>
                    <p><strong>姓名：</strong>${order.customer?.name || '-'}</p>
                    <p><strong>電子郵件：</strong>${order.customer?.email || '-'}</p>
                    <hr>
                    <h6>收件資訊</h6>
                    <p><strong>收件人：</strong>${order.recipient_name}</p>
                    <p><strong>電話：</strong>${order.recipient_phone}</p>
                    <p><strong>地址：</strong>${order.recipient_address}</p>
                    ${order.note ? `<p><strong>備註：</strong>${order.note}</p>` : ''}
                    <hr>
                    <h6>訂單商品</h6>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>商品名稱</th>
                                <th>單價</th>
                                <th>數量</th>
                                <th>小計</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${order.items.map(item => `
                                <tr>
                                    <td>${item.product.name}</td>
                                    <td>NT$ ${item.product.price}</td>
                                    <td>${item.quantity}</td>
                                    <td>NT$ ${item.product.price * item.quantity}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                        <tfoot>
                            <tr>
                                <th colspan="3">總計</th>
                                <th>NT$ ${order.total_amount}</th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        `;
    } catch (error) {
        console.error('載入訂單詳情失敗:', error);
    }
}

async function updateOrderStatus(orderId, status) {
    const token = localStorage.getItem('admin_token');
    try {
        const response = await fetch(`/api/admin/orders/${orderId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ status })
        });
        
        if (response.ok) {
            alert('更新成功');
        } else {
            alert('更新失敗');
        }
    } catch (error) {
        console.error('更新失敗:', error);
    }
}
</script>
{% endblock %}
