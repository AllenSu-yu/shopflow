{% extends "admin/base.html" %}

{% block title %}訂單詳情 - ShopFlow{% endblock %}

{% block admin_content %}
<div class="mb-4 d-flex align-items-center">
    <a href="/shop/{{ store.slug }}/admin/orders" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i> 返回列表
    </a>
    <h2 class="mb-0">訂單詳情</h2>
</div>

<div id="order-detail">
    <!-- 訂單詳情將由 JavaScript 動態載入 -->
    <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        checkAdminAuth();
        const orderId = '{{ order_id }}';
        loadOrderDetail(orderId);
    });

    function checkAdminAuth() {
        const token = localStorage.getItem('admin_token');
        if (!token) {
            window.location.href = '/shop/admin/login';
        }
    }

    async function loadOrderDetail(orderId) {
        const token = localStorage.getItem('admin_token');
        try {
            const response = await fetch(`/api/shop/{{ store.slug }}/admin/orders/${orderId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!response.ok) {
                document.getElementById('order-detail').innerHTML = '<div class="alert alert-danger">載入訂單失敗</div>';
                return;
            }

            const order = await response.json();

            const statusMap = {
                'pending': { label: '待處理', class: 'bg-warning text-dark' },
                'paid': { label: '已付款', class: 'bg-info text-white' },
                'shipped': { label: '已出貨', class: 'bg-success text-white' },
                'cancelled': { label: '已取消', class: 'bg-secondary text-white' }
            };
            const statusInfo = statusMap[order.status] || { label: order.status, class: 'bg-light text-dark' };

            document.getElementById('order-detail').innerHTML = `
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">訂單編號：#${order.order_number}</h5>
                        <span class="badge ${statusInfo.class} fs-6">${statusInfo.label}</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <p class="mb-1 text-muted">會員編號</p>
                            <p class="fw-bold">${order.customer_member_number || '-'}</p>
                        </div>
                        <div class="col-md-4">
                            <p class="mb-1 text-muted">訂購日期</p>
                            <p class="fw-bold">${new Date(order.created_at + "Z").toLocaleString('zh-TW')}</p>
                        </div>
                        <div class="col-md-4 text-md-end">
                            <p class="mb-1 text-muted">付款方式</p>
                            <p class="fw-bold">${order.payment_method === 'credit_card' ? '信用卡' : (order.payment_method === 'cod' ? '貨到付款' : order.payment_method || '-')}</p>
                        </div>
                    </div>

                    ${order.status === 'paid' ? `
                    <div class="card border-primary mb-4">
                        <div class="card-body bg-light">
                            <h6 class="card-title text-primary"><i class="bi bi-truck me-2"></i>訂單出貨處理</h6>
                            <div class="row align-items-end">
                                <div class="col-md-8">
                                    <label for="tracking-number-input" class="form-label small">貨運單編號</label>
                                    <input type="text" id="tracking-number-input" class="form-control" placeholder="請輸入物流追蹤號碼">
                                </div>
                                <div class="col-md-4 mt-2 mt-md-0">
                                    <button class="btn btn-primary w-100" onclick="updateTrackingNumber(${order.id})">確認出貨</button>
                                </div>
                            </div>
                            <div class="form-text mt-2 text-primary">輸入貨運單編號後，系統將自動將狀態更新為「已出貨」。</div>
                        </div>
                    </div>
                    ` : (order.tracking_number ? `
                    <div class="row mb-4">
                        <div class="col-md-12">
                            <p class="mb-1 text-muted">貨運單編號</p>
                            <p class="fw-bold border rounded p-2 bg-light d-inline-block">${order.tracking_number}</p>
                        </div>
                    </div>
                    ` : '')}

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h6 class="border-bottom pb-2">收件資訊</h6>
                            <p class="mb-1"><strong>名稱：</strong>${order.recipient_name || '-'}</p>
                            <p class="mb-1"><strong>電話：</strong>${order.recipient_phone || '-'}</p>
                            <p class="mb-1"><strong>地址：</strong>${order.recipient_address || '-'}</p>
                        </div>
                        <div class="col-md-6">
                            <h6 class="border-bottom pb-2">物流資訊</h6>
                            <p class="mb-1"><strong>物流方式：</strong>${order.shipping_method === 'standard' ? '宅配' : (order.shipping_method || '-')}</p>
                            <p class="mb-1"><strong>出貨時間：</strong>${order.shipped_at ? new Date(order.shipped_at + "Z").toLocaleString('zh-TW') : '尚未出貨'}</p>
                        </div>
                    </div>

                    <h6 class="border-bottom pb-2">訂單商品</h6>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>商品名稱</th>
                                    <th>規格</th>
                                    <th class="text-end">單價</th>
                                    <th class="text-center">數量</th>
                                    <th class="text-end">小計</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${order.items.map(item => `
                                    <tr>
                                        <td>${item.product_name}</td>
                                        <td><small class="text-muted">${item.spec_info || '-'}</small></td>
                                        <td class="text-end">NT$ ${item.product_price}</td>
                                        <td class="text-center">${item.quantity}</td>
                                        <td class="text-end fw-bold">NT$ ${item.subtotal}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                            <tfoot class="table-light">
                                <tr>
                                    <td colspan="4" class="text-end">運費</td>
                                    <td class="text-end">NT$ ${order.shipping_fee || 0}</td>
                                </tr>
                                <tr class="fs-5">
                                    <td colspan="4" class="text-end fw-bold">總計</td>
                                    <td class="text-end fw-bold text-danger">NT$ ${order.total}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        `;
        } catch (error) {
            console.error('載入訂單詳情失敗:', error);
            document.getElementById('order-detail').innerHTML = '<div class="alert alert-danger">發生錯誤，請稍後再試</div>';
        }
    }

    async function updateTrackingNumber(orderId) {
        const token = localStorage.getItem('admin_token');
        const trackingNumber = document.getElementById('tracking-number-input').value.trim();

        if (!trackingNumber) {
            alert('請輸入物流單號');
            return;
        }

        try {
            const response = await fetch(`/api/shop/{{ store.slug }}/admin/orders/${orderId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ 
                    tracking_number: trackingNumber,
                    status: 'shipped'
                })
            });

            if (response.ok) {
                alert('出貨成功，訂單狀態已變更為「已出貨」');
                loadOrderDetail(orderId);
            } else {
                const error = await response.json();
                alert('更新失敗: ' + (error.detail || '未知錯誤'));
            }
        } catch (error) {
            console.error('更新失敗:', error);
            alert('網路錯誤');
        }
    }
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
{% endblock %}
